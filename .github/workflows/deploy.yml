name: Build & Deploy VOD

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy-staging:
    name: Deploy to Staging (arkserver)
    needs: build
    continue-on-error: true  # Don't block production deploy if staging fails
    if: |
      (github.ref == 'refs/heads/dev' && github.event_name == 'push') ||
      (github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch'))
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://vod.arkserver.arkturian.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload artifacts to Staging Server (arkserver)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "dist/*"
          target: "/var/www/vod.arkserver.arkturian.com"
          strip_components: 1
          rm: true

      - name: Set permissions on Staging Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            DEPLOY_PATH="/var/www/vod.arkserver.arkturian.com"
            chown -R www-data:www-data "$DEPLOY_PATH"
            chmod -R 755 "$DEPLOY_PATH"
            echo "✅ Staging deployment completed successfully!"

  deploy-production:
    name: Deploy to Production
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://vod.arkturian.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload artifacts to Production Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_DEPLOY_HOST || secrets.DEPLOY_HOST }}
          port: ${{ secrets.PROD_DEPLOY_PORT || secrets.DEPLOY_PORT || 22 }}
          username: ${{ secrets.PROD_DEPLOY_USER || secrets.DEPLOY_USER }}
          key: ${{ secrets.PROD_DEPLOY_SSH_KEY || secrets.DEPLOY_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/vod.arkturian.com"
          strip_components: 1
          rm: true

      - name: Set permissions on Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_DEPLOY_HOST || secrets.DEPLOY_HOST }}
          port: ${{ secrets.PROD_DEPLOY_PORT || secrets.DEPLOY_PORT || 22 }}
          username: ${{ secrets.PROD_DEPLOY_USER || secrets.DEPLOY_USER }}
          key: ${{ secrets.PROD_DEPLOY_SSH_KEY || secrets.DEPLOY_SSH_KEY }}
          script: |
            DEPLOY_PATH="/var/www/vod.arkturian.com"
            chown -R www-data:www-data "$DEPLOY_PATH"
            chmod -R 755 "$DEPLOY_PATH"
            echo "✅ Production deployment completed successfully!"
