name: Build & Deploy VOD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to ${{ matrix.server.name }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server:
          - name: arkserver.arkturian.com
            host_secret: DEPLOY_HOST_ARKSERVER
            deploy_path: /var/www/vod.arkserver.arkturian.com
            repo_path: /var/code/vod-server
            url: https://vod.arkserver.arkturian.com
          - name: arkturian.com
            host_secret: DEPLOY_HOST
            deploy_path: /var/www/vod.arkturian.com
            repo_path: /var/code/vod-server
            url: https://vod.arkturian.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to ${{ matrix.server.name }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets[matrix.server.host_secret] }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            REPO_PATH="${{ matrix.server.repo_path }}"
            DEPLOY_PATH="${{ matrix.server.deploy_path }}"
            BACKUP_DIR="/var/backups"
            BACKUP_PREFIX="vod-$(basename ${{ matrix.server.deploy_path }})"
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            BACKUP_PATH="$BACKUP_DIR/${BACKUP_PREFIX}-${TIMESTAMP}"

            echo "📂 Repository: $REPO_PATH"
            echo "🎯 Deploy to: $DEPLOY_PATH"
            echo "🌐 Server: ${{ matrix.server.name }}"

            cd "$REPO_PATH"

            echo "🔧 Cleaning up git repository..."
            git gc --prune=now

            echo "🔄 Fetching latest code..."
            git fetch origin --prune
            git reset --hard origin/main

            # Create backup
            if [ -d "$DEPLOY_PATH" ]; then
              echo "💾 Creating backup..."
              mkdir -p "$BACKUP_DIR"
              cp -r "$DEPLOY_PATH" "$BACKUP_PATH"
              echo "✅ Backup saved to: $BACKUP_PATH"
            fi

            # Deploy
            echo "🚀 Deploying Vite application..."
            npm install
            npm run build

            mkdir -p "$DEPLOY_PATH"
            rsync -av --delete \
              --exclude='.git' \
              --exclude='node_modules' \
              --exclude='src' \
              --exclude='.env' \
              dist/ "$DEPLOY_PATH/"

            # Set permissions
            chown -R www-data:www-data "$DEPLOY_PATH"
            chmod -R 755 "$DEPLOY_PATH"

            echo "✅ Deployment completed successfully!"
            echo "📁 Live at: ${{ matrix.server.url }}"
            echo "💾 Backup: $BACKUP_PATH"

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployment successful to ${{ matrix.server.name }}!"
          echo "📍 Site: ${{ matrix.server.url }}"
          echo "📦 Commit: ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed for ${{ matrix.server.name }}"
          echo "📦 Commit: ${{ github.sha }}"
          echo "Check logs above for details"
